[tox]
envlist = py314
isolated_build = true

[testenv]
allowlist_externals =
    ./run_tests
    ./run_checks
deps =
     -rrequirements/dev.txt
sitepackages = false
passenv =
     SUPABASE_API_KEY
     SUPABASE_HOST
     SUPABASE_PASSWORD
     SUPABASE_URL
     SUPABASE_USER
commands =
    ./run_tests
    ./run_checks

[gh-actions]
python =
    3.14: py314
